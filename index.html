<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>贪吃蛇游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2ecc71;
      --primary-dark: #27ae60;
      --secondary: #e74c3c;
      --bg-dark: #1a1a2e;
      --bg-darker: #16213e;
      --text-light: #eee;
      --text-muted: #aaa;
      --neon-blue: #00d4ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      max-width: 100%;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      font-size: 14px;
    }

    .game-header .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-header .stat-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .game-header .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--primary);
    }

    .game-header .skin-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .skin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .skin-dot.classic { background: #2ecc71; }
    .skin-dot.neon { background: #00d4ff; box-shadow: 0 0 8px #00d4ff; }
    .skin-dot.rainbow { background: linear-gradient(90deg, red, orange, yellow, green, blue, purple); }

    #gameCanvas {
      background: #000;
      border: 3px solid var(--primary);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
      touch-action: none;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 10px;
      text-align: center;
    }

    .overlay h2 {
      font-size: 1.8rem;
      color: var(--primary);
      margin-bottom: 20px;
      text-align: center;
    }

    .overlay p {
      color: var(--text-muted);
      margin-bottom: 30px;
      text-align: center;
    }

    .skin-selector {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .skin-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .skin-option:hover {
      background: rgba(255,255,255,0.15);
    }

    .skin-option.selected {
      border-color: var(--primary);
      background: rgba(46, 204, 113, 0.2);
    }

    .skin-option .preview {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .skin-option .preview.classic { background: #2ecc71; }
    .skin-option .preview.neon {
      background: #00d4ff;
      box-shadow: 0 0 15px #00d4ff;
    }
    .skin-option .preview.rainbow {
      background: linear-gradient(90deg, red, orange, yellow, green, blue, purple);
    }

    .skin-option .name {
      font-size: 13px;
      color: var(--text-light);
    }

    .btn {
      background: var(--primary);
      color: var(--bg-dark);
      border: none;
      padding: 15px 40px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-light);
      border: 2px solid var(--text-muted);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: transparent;
    }

    .game-over-content {
      text-align: center;
    }

    .final-score {
      font-size: 3rem;
      color: var(--secondary);
      margin: 20px 0;
    }

    .input-group {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .input-group label {
      color: var(--text-muted);
      font-size: 14px;
    }

    .input-group input {
      background: rgba(255,255,255,0.1);
      border: 2px solid var(--text-muted);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 16px;
      color: var(--text-light);
      width: 200px;
      text-align: center;
      max-width: 100%;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .leaderboard {
      margin-top: 20px;
      width: 100%;
      max-width: 350px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 20px;
    }

    .leaderboard h3 {
      color: var(--primary);
      margin-bottom: 15px;
      text-align: center;
    }

    .leaderboard-list {
      list-style: none;
    }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }

    .leaderboard-item:last-child {
      border-bottom: none;
    }

    .leaderboard-item .rank {
      color: var(--text-muted);
      width: 30px;
    }

    .leaderboard-item .rank.top-3 {
      color: gold;
    }

    .leaderboard-item .name {
      flex: 1;
      text-align: left;
      margin-left: 10px;
    }

    .leaderboard-item .score {
      color: var(--primary);
      font-weight: bold;
    }

    .loading {
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
    }

    .error {
      color: var(--secondary);
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    .controls-hint {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 15px;
      text-align: center;
    }

    @media (max-width: 450px) {
      #gameCanvas {
        width: 320px !important;
        height: 320px !important;
      }

      .game-header {
        padding: 8px 10px;
      }

      .game-header .stat-value {
        font-size: 16px;
      }

      .overlay h1 {
        font-size: 2rem;
      }

      .skin-option {
        padding: 12px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="stat">
        <span class="stat-label">分数</span>
        <span class="stat-value" id="currentScore">0</span>
      </div>
      <div class="skin-indicator">
        <span id="skinName">经典</span>
        <div class="skin-dot classic" id="skinDot"></div>
      </div>
      <div class="stat">
        <span class="stat-label">难度</span>
        <span class="stat-value" id="difficultyName" style="font-size: 14px;">普通</span>
      </div>
      <div class="stat">
        <span class="stat-label">最高分</span>
        <span class="stat-value" id="highScore">0</span>
      </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls-hint">
      方向键 / WASD 移动 | 空格暂停 | 触摸屏滑动
    </div>
  </div>

  <!-- Start Screen -->
  <div class="overlay" id="startScreen">
    <h1>贪吃蛇</h1>
    <p>选择蛇的皮肤，然后开始游戏</p>

    <div class="skin-selector">
      <div class="skin-option selected" data-skin="classic">
        <div class="preview classic"></div>
        <span class="name">经典绿</span>
      </div>
      <div class="skin-option" data-skin="neon">
        <div class="preview neon"></div>
        <span class="name">霓虹蓝</span>
      </div>
      <div class="skin-option" data-skin="rainbow">
        <div class="preview rainbow"></div>
        <span class="name">彩虹</span>
      </div>
    </div>

    <p style="color: var(--text-muted); margin-bottom: 15px;">选择难度</p>
    <div class="skin-selector" id="difficultySelector">
      <div class="skin-option" data-difficulty="easy">
        <span class="name">简单</span>
      </div>
      <div class="skin-option selected" data-difficulty="normal">
        <span class="name">普通</span>
      </div>
      <div class="skin-option" data-difficulty="hard">
        <span class="name">困难</span>
      </div>
    </div>

    <button class="btn" id="startBtn">开始游戏</button>

    <div class="leaderboard" id="startLeaderboard">
      <h3>排行榜</h3>
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <div class="game-over-content">
      <h2>游戏结束</h2>
      <div class="final-score" id="finalScore">0</div>

      <div class="input-group">
        <label>输入你的名字</label>
        <input type="text" id="playerName" maxlength="10" placeholder="匿名玩家">
      </div>

      <button class="btn" id="submitScoreBtn">提交分数</button>
      <button class="btn btn-secondary" id="playAgainBtn">再玩一次</button>
      <button class="btn btn-secondary" id="backToMenuBtn">返回主菜单</button>
    </div>

    <div class="leaderboard" id="gameOverLeaderboard">
      <h3>排行榜</h3>
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    // Game Configuration
    const GRID_SIZE = 20;
    const CANVAS_SIZE = 400;
    const CELL_SIZE = CANVAS_SIZE / GRID_SIZE;

    // Difficulty Settings
    const DIFFICULTY = {
      easy: { initialSpeed: 200, minSpeed: 120, speedDecrease: 3, scoreMultiplier: 1, name: '简单' },
      normal: { initialSpeed: 150, minSpeed: 60, speedDecrease: 5, scoreMultiplier: 1, name: '普通' },
      hard: { initialSpeed: 100, minSpeed: 40, speedDecrease: 8, scoreMultiplier: 2, name: '困难' }
    };
    let selectedDifficulty = 'normal';
    const INITIAL_SPEED = DIFFICULTY[selectedDifficulty].initialSpeed;

    // Game State
    let canvas, ctx;
    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let highScore = 0;
    let gameSpeed = INITIAL_SPEED;
    let gameLoop = null;
    let isPlaying = false;
    let selectedSkin = 'classic';
    let rainbowHue = 0;

    // DOM Elements
    let startScreen, gameOverScreen;
    let currentScoreEl, highScoreEl, skinNameEl, skinDotEl, difficultyNameEl;
    let finalScoreEl, playerNameInput;
    let startLeaderboard, gameOverLeaderboard;

    // Skin Colors
    const SKINS = {
      classic: { primary: '#2ecc71', secondary: '#27ae60' },
      neon: { primary: '#00d4ff', secondary: '#0099cc', glow: true },
      rainbow: { primary: 'rainbow', secondary: 'rainbow-dark' }
    };

    // Initialize
    function init() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');

      startScreen = document.getElementById('startScreen');
      gameOverScreen = document.getElementById('gameOverScreen');
      currentScoreEl = document.getElementById('currentScore');
      highScoreEl = document.getElementById('highScore');
      skinNameEl = document.getElementById('skinName');
      skinDotEl = document.getElementById('skinDot');
      difficultyNameEl = document.getElementById('difficultyName');
      finalScoreEl = document.getElementById('finalScore');
      playerNameInput = document.getElementById('playerName');
      startLeaderboard = document.getElementById('startLeaderboard');
      gameOverLeaderboard = document.getElementById('gameOverLeaderboard');

      // Load high score from localStorage
      highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
      highScoreEl.textContent = highScore;

      // Event Listeners
      setupEventListeners();

      // Touch controls
      setupTouchControls();

      // Load leaderboard
      loadLeaderboard(startLeaderboard);
    }

    function setupEventListeners() {
      // Keyboard controls
      document.addEventListener('keydown', handleKeyDown);

      // Skin selector — scoped to .skin-selector (first one, before difficulty)
      document.querySelectorAll('.skin-selector:not(#difficultySelector) .skin-option').forEach(option => {
        option.addEventListener('click', () => {
          document.querySelectorAll('.skin-selector:not(#difficultySelector) .skin-option').forEach(o => o.classList.remove('selected'));
          option.classList.add('selected');
          selectedSkin = option.dataset.skin;
          updateSkinIndicator();
        });
      });

      // Difficulty selector
      document.querySelectorAll('#difficultySelector .skin-option').forEach(option => {
        option.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('#difficultySelector .skin-option').forEach(o => o.classList.remove('selected'));
          option.classList.add('selected');
          selectedDifficulty = option.dataset.difficulty;
        });
      });

      // Buttons
      document.getElementById('startBtn').addEventListener('click', startGame);
      document.getElementById('submitScoreBtn').addEventListener('click', submitScore);
      document.getElementById('playAgainBtn').addEventListener('click', () => {
        gameOverScreen.classList.add('hidden');
        startGame();
      });
      document.getElementById('backToMenuBtn').addEventListener('click', () => {
        gameOverScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        loadLeaderboard(startLeaderboard);
      });
    }

    function setupTouchControls() {
      let touchStartX = 0;
      let touchStartY = 0;

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: false });

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!isPlaying) return;

        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;

        const minSwipe = 30;

        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > minSwipe && direction.x !== -1) {
            nextDirection = { x: 1, y: 0 };
          } else if (dx < -minSwipe && direction.x !== 1) {
            nextDirection = { x: -1, y: 0 };
          }
        } else {
          if (dy > minSwipe && direction.y !== -1) {
            nextDirection = { x: 0, y: 1 };
          } else if (dy < -minSwipe && direction.y !== 1) {
            nextDirection = { x: 0, y: -1 };
          }
        }
      }, { passive: false });
    }

    function handleKeyDown(e) {
      // Prevent scrolling
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }

      if (!isPlaying && e.key === ' ') {
        return;
      }

      // Direction controls
      switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          break;
        case ' ':
          if (isPlaying) {
            // Pause handled elsewhere
          }
          break;
      }
    }

    function updateSkinIndicator() {
      const skinNames = { classic: '经典', neon: '霓虹', rainbow: '彩虹' };
      skinNameEl.textContent = skinNames[selectedSkin];

      skinDotEl.className = 'skin-dot ' + selectedSkin;
    }

    function startGame() {
      // Get difficulty settings
      const diff = DIFFICULTY[selectedDifficulty];

      // Reset game state
      snake = [
        { x: Math.floor(GRID_SIZE / 2), y: Math.floor(GRID_SIZE / 2) }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameSpeed = diff.initialSpeed;
      isPlaying = true;

      // Update UI
      currentScoreEl.textContent = score;
      updateSkinIndicator();
      difficultyNameEl.textContent = DIFFICULTY[selectedDifficulty].name;

      // Hide start screen
      startScreen.classList.add('hidden');

      // Place food
      placeFood();

      // Start game loop
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, gameSpeed);
    }

    function placeFood() {
      let validPosition = false;
      while (!validPosition) {
        food = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        validPosition = !snake.some(s => s.x === food.x && s.y === food.y);
      }
    }

    function update() {
      // Apply next direction
      direction = { ...nextDirection };

      // Calculate new head position
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Check wall collision
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        gameOver();
        return;
      }

      // Check self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      // Add new head
      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        const diff = DIFFICULTY[selectedDifficulty];
        score += diff.scoreMultiplier;
        currentScoreEl.textContent = score;

        // Increase speed
        if (gameSpeed > diff.minSpeed) {
          gameSpeed = Math.max(diff.minSpeed, gameSpeed - diff.speedDecrease);
          clearInterval(gameLoop);
          gameLoop = setInterval(update, gameSpeed);
        }

        placeFood();
      } else {
        // Remove tail if no food eaten
        snake.pop();
      }

      // Draw
      draw();
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // Update rainbow hue
      if (selectedSkin === 'rainbow') {
        rainbowHue = (rainbowHue + 2) % 360;
      }

      // Draw food
      ctx.fillStyle = '#e74c3c';
      ctx.shadowColor = '#e74c3c';
      ctx.shadowBlur = 10;
      ctx.fillRect(
        food.x * CELL_SIZE + 2,
        food.y * CELL_SIZE + 2,
        CELL_SIZE - 4,
        CELL_SIZE - 4
      );
      ctx.shadowBlur = 0;

      // Draw snake
      snake.forEach((segment, index) => {
        let color;

        if (selectedSkin === 'rainbow') {
          const hue = (rainbowHue + index * 15) % 360;
          color = `hsl(${hue}, 80%, 60%)`;
        } else if (selectedSkin === 'neon') {
          color = index === 0 ? SKINS.neon.primary : SKINS.neon.secondary;
        } else {
          color = index === 0 ? SKINS.classic.primary : SKINS.classic.secondary;
        }

        if (selectedSkin === 'neon') {
          ctx.shadowColor = SKINS.neon.primary;
          ctx.shadowBlur = index === 0 ? 15 : 8;
        }

        ctx.fillStyle = color;
        ctx.fillRect(
          segment.x * CELL_SIZE + 1,
          segment.y * CELL_SIZE + 1,
          CELL_SIZE - 2,
          CELL_SIZE - 2
        );

        ctx.shadowBlur = 0;
      });
    }

    function gameOver() {
      isPlaying = false;
      clearInterval(gameLoop);
      gameLoop = null;

      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
      }

      // Show game over screen
      finalScoreEl.textContent = score;
      gameOverScreen.classList.remove('hidden');
      loadLeaderboard(gameOverLeaderboard);
    }

    async function submitScore() {
      const name = playerNameInput.value.trim() || '匿名玩家';

      try {
        const response = await fetch('/api/scores', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, score })
        });

        if (response.ok) {
          alert('分数提交成功！');
          loadLeaderboard(gameOverLeaderboard);
        } else {
          alert('分数提交失败，请重试');
        }
      } catch (error) {
        console.error('提交分数错误:', error);
        // Save to local leaderboard as fallback
        saveLocalLeaderboard(name, score);
        alert('分数已保存到本地（网络错误）');
      }
    }

    async function loadLeaderboard(container) {
      container.innerHTML = '<h3>排行榜</h3><div class="loading">加载中...</div>';

      try {
        const response = await fetch('/api/scores');
        if (!response.ok) throw new Error('获取排行榜失败');

        const data = await response.json();
        renderLeaderboard(container, Array.isArray(data) ? data : []);
      } catch (error) {
        console.error('加载排行榜错误:', error);
        // Try to load from local storage
        const localScores = JSON.parse(localStorage.getItem('snakeLocalLeaderboard') || '[]');
        if (localScores.length > 0) {
          renderLeaderboard(container, localScores);
        } else {
          container.innerHTML = '<h3>排行榜</h3><div class="error">无法加载排行榜</div>';
        }
      }
    }

    function renderLeaderboard(container, scores) {
      if (!scores || scores.length === 0) {
        container.innerHTML = '<h3>排行榜</h3><div class="loading">暂无数据</div>';
        return;
      }

      const top10 = scores.slice(0, 10);
      let html = '<h3>排行榜</h3><ul class="leaderboard-list">';

      top10.forEach((entry, index) => {
        const rankClass = index < 3 ? 'top-3' : '';
        html += `
          <li class="leaderboard-item">
            <span class="rank ${rankClass}">${index + 1}</span>
            <span class="name">${escapeHtml(entry.name)}</span>
            <span class="score">${entry.score}</span>
          </li>
        `;
      });

      html += '</ul>';
      container.innerHTML = html;
    }

    function saveLocalLeaderboard(name, score) {
      const scores = JSON.parse(localStorage.getItem('snakeLocalLeaderboard') || '[]');
      scores.push({ name, score });
      scores.sort((a, b) => b.score - a.score);
      localStorage.setItem('snakeLocalLeaderboard', JSON.stringify(scores.slice(0, 100)));
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
